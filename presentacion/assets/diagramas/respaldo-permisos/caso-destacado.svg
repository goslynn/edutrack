<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Geist','Segoe UI',sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#334155"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto"><path d="M9,0 L0,3 L9,6 Z" fill="#16a34a"/></marker>
    <style>
      .head{fill:#1e293b}
      .htxt{fill:#fff;font-size:14px;font-weight:700}
      .ll{stroke:#cbd5e1;stroke-width:1.4;stroke-dasharray:4 4}
      .msg{stroke:#334155;stroke-width:1.8;fill:none}
      .ret{stroke:#16a34a;stroke-width:1.8;fill:none;stroke-dasharray:6 3}
      .m{font-size:12.5px;fill:#0f172a}
      .note{font-size:11.5px;fill:#475569}
      .act{fill:#dbeafe;stroke:#2563eb;stroke-width:1.2}
    </style>
  </defs>

  <text x="24" y="30" font-size="13" font-weight="700" fill="#64748b" letter-spacing=".05em">CASO DESTACADO — VERIFICACIÓN DE PERMISOS ENTRE SERVICIOS (Ana, rol DOCENTE, edita su asignatura)</text>

  <!-- heads -->
  <g>
    <rect class="head" x="40" y="50" width="150" height="40" rx="6"/><text x="115" y="76" text-anchor="middle" class="htxt">Cliente</text>
    <rect class="head" x="300" y="50" width="160" height="40" rx="6"/><text x="380" y="76" text-anchor="middle" class="htxt">API Gateway</text>
    <rect class="head" x="580" y="50" width="160" height="40" rx="6"/><text x="660" y="76" text-anchor="middle" class="htxt">Course (MS)</text>
    <rect class="head" x="860" y="50" width="150" height="40" rx="6"/><text x="935" y="76" text-anchor="middle" class="htxt">Auth (MS)</text>
    <rect class="head" x="1080" y="50" width="96" height="40" rx="6"/><text x="1128" y="76" text-anchor="middle" class="htxt">BD</text>
  </g>
  <!-- lifelines -->
  <line class="ll" x1="115" y1="90" x2="115" y2="660"/>
  <line class="ll" x1="380" y1="90" x2="380" y2="660"/>
  <line class="ll" x1="660" y1="90" x2="660" y2="660"/>
  <line class="ll" x1="935" y1="90" x2="935" y2="660"/>
  <line class="ll" x1="1128" y1="90" x2="1128" y2="660"/>

  <!-- 1 Cliente -> Gateway -->
  <line class="msg" x1="115" y1="130" x2="378" y2="130" marker-end="url(#a)"/>
  <text x="120" y="124" class="m">PATCH /asign/42 — Authorization: Bearer &lt;JWT&gt;</text>

  <!-- gateway self note -->
  <rect class="act" x="332" y="148" width="96" height="40" rx="5"/>
  <text x="380" y="164" text-anchor="middle" class="note">valida firma</text>
  <text x="380" y="180" text-anchor="middle" class="note">RS256 → sub,roles</text>

  <!-- 2 Gateway -> Course -->
  <line class="msg" x1="380" y1="215" x2="658" y2="215" marker-end="url(#a)"/>
  <text x="386" y="209" class="m">PATCH /asign/42 + X-User-Id, X-User-Roles</text>
  <text x="386" y="230" class="note">(elimina Authorization)</text>

  <!-- course note RequestContext -->
  <rect class="act" x="612" y="246" width="96" height="38" rx="5"/>
  <text x="660" y="262" text-anchor="middle" class="note">RequestContext</text>
  <text x="660" y="277" text-anchor="middle" class="note">lee cabeceras 1×</text>

  <!-- 3 Course -> Auth -->
  <line class="msg" x1="660" y1="312" x2="933" y2="312" marker-end="url(#a)"/>
  <text x="666" y="306" class="m">GET /auth/access?resourceKey=course.asignatura&amp;permission=WRITE</text>

  <!-- auth note -->
  <rect class="act" x="858" y="330" width="154" height="56" rx="5"/>
  <text x="935" y="348" text-anchor="middle" class="note">effectiveFlags =</text>
  <text x="935" y="363" text-anchor="middle" class="note">OR(flags roles) | ALL</text>
  <text x="935" y="378" text-anchor="middle" class="note">(flags &amp; WRITE)==WRITE</text>

  <!-- 4 Auth -> Course return -->
  <line class="ret" x1="933" y1="410" x2="662" y2="410" marker-end="url(#ar)"/>
  <text x="700" y="404" class="m" fill="#15803d">200 · text/plain "1"</text>

  <!-- 5 Course -> BD -->
  <line class="msg" x1="660" y1="450" x2="1126" y2="450" marker-end="url(#a)"/>
  <text x="666" y="444" class="m">SELECT * FROM asignatura WHERE id=42 AND docente_id = :userId</text>

  <!-- 6 BD -> Course -->
  <line class="ret" x1="1126" y1="486" x2="662" y2="486" marker-end="url(#ar)"/>
  <text x="720" y="480" class="m" fill="#15803d">1 fila → pertenece a Ana ⇒ UPDATE permitido</text>

  <!-- 7 Course -> Gateway -> Cliente -->
  <line class="ret" x1="660" y1="524" x2="117" y2="524" marker-end="url(#ar)"/>
  <text x="150" y="518" class="m" fill="#15803d">200 OK</text>

  <!-- denied variant -->
  <rect x="40" y="556" width="1136" height="96" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.4"/>
  <text x="56" y="580" font-size="12.5" font-weight="700" fill="#b91c1c">Variante denegada — asignatura ajena (/asign/99)</text>
  <text x="56" y="602" class="note">Auth sigue respondiendo "1": Ana SÍ puede WRITE sobre el TIPO de recurso asignatura, en general (decisión genérica por tipo).</text>
  <text x="56" y="622" class="note">Pero Course: SELECT ... WHERE id=99 AND docente_id = :userId ⇒ 0 filas ⇒ Course responde 403 (o 404 si oculta existencia).</text>
  <text x="56" y="642" class="note" font-weight="700" fill="#334155">Regla de oro: Auth decide por TIPO de recurso · el MS dueño decide por INSTANCIA. La lógica de bits vive en UN solo evaluador.</text>
</svg>
